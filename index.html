<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 简历优化工作台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">AI</div>
        <div>
          <h1>简历优化工作台</h1>
          <p>岗位匹配、证据映射、改写生成</p>
        </div>
      </div>

      <section class="panel compact">
        <div class="panel-title">
          <span>目标岗位</span>
          <span class="pill" id="rolePill">产品经理</span>
        </div>
        <label>
          岗位方向
          <select id="roleSelect">
            <option>产品经理</option>
            <option>AI 产品经理</option>
            <option>用户运营</option>
            <option>数据分析师</option>
            <option>前端开发</option>
          </select>
        </label>
        <label>
          经验阶段
          <select id="levelSelect">
            <option>应届 / 0-1 年</option>
            <option>1-3 年</option>
            <option>3-5 年</option>
            <option>5 年以上</option>
          </select>
        </label>
      </section>

      <section class="panel compact">
        <div class="panel-title">
          <span>优化模式</span>
          <span class="status-dot"></span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="atsToggle" checked>
          <span>ATS 关键词增强</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="proofToggle" checked>
          <span>补强项目证据</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="interviewToggle">
          <span>面试追问风险</span>
        </label>
      </section>

      <section class="panel history">
        <div class="panel-title">
          <span>最近生成</span>
          <button class="icon-btn" id="clearHistory" title="清空历史">×</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Resume Copilot</p>
          <h2>把简历改到更贴近 JD，而不是堆关键词</h2>
        </div>
        <div class="actions">
          <button class="ghost" id="sampleBtn">填入示例</button>
          <button class="primary" id="analyzeBtn">开始分析</button>
        </div>
      </header>

      <section class="input-grid">
        <div class="editor-card">
          <div class="card-head">
            <span>原始简历</span>
            <span id="resumeCount">0 字</span>
          </div>
          <textarea id="resumeInput" placeholder="粘贴你的简历内容，建议包含教育背景、项目经历、实习/工作经历、技能栈。"></textarea>
        </div>
        <div class="editor-card">
          <div class="card-head">
            <span>目标 JD</span>
            <span id="jdCount">0 字</span>
          </div>
          <textarea id="jdInput" placeholder="粘贴岗位 JD，包含岗位职责、任职要求、加分项。"></textarea>
        </div>
      </section>

      <section class="result-layout">
        <div class="score-panel">
          <div class="score-ring" style="--score: 0" id="scoreRing">
            <span id="scoreValue">0</span>
            <small>匹配度</small>
          </div>
          <div class="score-copy">
            <h3 id="scoreTitle">等待分析</h3>
            <p id="scoreSummary">输入简历和 JD 后，系统会拆解关键词、经历证据和表达风险。</p>
          </div>
        </div>

        <div class="tabs">
          <div class="tab-list" role="tablist">
            <button class="tab active" data-tab="gap">差距诊断</button>
            <button class="tab" data-tab="rewrite">改写预览</button>
            <button class="tab" data-tab="interview">面试风险</button>
          </div>

          <div class="tab-panel active" id="gap">
            <div class="insight-grid" id="insightGrid"></div>
          </div>

          <div class="tab-panel" id="rewrite">
            <div class="rewrite-toolbar">
              <label>
                改写强度
                <input type="range" id="toneRange" min="1" max="3" value="2">
              </label>
              <button class="ghost" id="regenerateBtn">重新生成</button>
              <button class="primary" id="copyBtn">复制改写稿</button>
            </div>
            <article class="resume-preview" id="rewritePreview">
              <p>完成分析后，这里会生成更贴近目标岗位的简历摘要和项目经历表达。</p>
            </article>
          </div>

          <div class="tab-panel" id="interview">
            <div class="risk-list" id="riskList"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast">已复制</div>
  <script src="./script.js"></script>
</body>
</html>
